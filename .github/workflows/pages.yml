name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - deployment-status.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify and build
        run: npm run verify

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live page
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in {1..12}; do
            status=$(curl --location --silent --show-error --output /tmp/inventory-page.html --write-out "%{http_code}" "$PAGE_URL" || true)
            if [[ "$status" == "200" ]] && grep -q "우리집 재고" /tmp/inventory-page.html; then
              printf '{\n  "status": "ok",\n  "url": "%s",\n  "commit": "%s",\n  "verifiedAt": "%s"\n}\n' \
                "$PAGE_URL" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deployment-status.json
              exit 0
            fi
            sleep 5
          done
          echo "Deployed page did not return the expected app." >&2
          exit 1

      - name: Save deployment verification
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-status.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record verified Pages deployment"
          git push
