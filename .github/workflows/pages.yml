name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - deployment-status.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify deployment variables
        shell: bash
        run: |
          if [[ -z "$VITE_SUPABASE_URL" || -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]]; then
            echo "VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY must be configured as GitHub repository variables." >&2
            exit 1
          fi

      - name: Verify and build
        run: npm run verify

      - name: Verify built entry files
        shell: bash
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "dist/index.html still points to Vite source code." >&2
            exit 1
          fi

          script_src=$(grep -oE 'src="[^"]+\.js"' dist/index.html | head -n 1 | cut -d '"' -f 2)
          if [[ -z "$script_src" ]]; then
            echo "No built JavaScript entry was found in dist/index.html." >&2
            exit 1
          fi

          if [[ "$script_src" != ./assets/* ]]; then
            echo "Expected a deployment-portable relative asset path, got: $script_src" >&2
            exit 1
          fi

          local_asset="dist/${script_src#./}"
          if [[ ! -s "$local_asset" ]]; then
            echo "Built JavaScript entry is missing: $local_asset" >&2
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live page and JavaScript entry
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in {1..12}; do
            status=$(curl --location --silent --show-error --output /tmp/inventory-page.html --write-out "%{http_code}" "$PAGE_URL" || true)

            if [[ "$status" != "200" ]]; then
              sleep 5
              continue
            fi

            if grep -q '/src/main.tsx' /tmp/inventory-page.html; then
              echo "GitHub Pages is serving raw Vite source instead of dist." >&2
              exit 1
            fi

            script_src=$(grep -oE 'src="[^"]+\.js"' /tmp/inventory-page.html | head -n 1 | cut -d '"' -f 2)
            if [[ -z "$script_src" ]]; then
              sleep 5
              continue
            fi

            asset_url=$(python3 -c 'import sys; from urllib.parse import urljoin; print(urljoin(sys.argv[1], sys.argv[2]))' "$PAGE_URL" "$script_src")
            asset_status=$(curl --location --silent --show-error --output /tmp/inventory-app.js --write-out "%{http_code}" "$asset_url" || true)

            if [[ "$asset_status" == "200" ]] && [[ -s /tmp/inventory-app.js ]]; then
              printf '{\n  "status": "ok",\n  "url": "%s",\n  "assetUrl": "%s",\n  "commit": "%s",\n  "verifiedAt": "%s"\n}\n' \
                "$PAGE_URL" "$asset_url" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deployment-status.json
              exit 0
            fi

            sleep 5
          done

          echo "Deployed page or JavaScript entry did not become available." >&2
          exit 1

      - name: Save deployment verification
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-status.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record verified Pages deployment"
          git push
